version: '3.9'

services:

  # Frontend — Vue app
  frontend:
    build: .
    ports:
      - "3000:80"
    depends_on:
      - ws-server
    environment:
      - VITE_WS_URL=ws://localhost:8080

  # Mock WebSocket server
  ws-server:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./src/mock:/app
      - ./package.json:/app/package.json
    command: sh -c "npm install ws && node ws-server.js"
    ports:
      - "8080:8080"

  # Nginx reverse proxy (production, frontend + ws )
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - ws-server